<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClarityX - Loading</title>
    <link rel="icon" type="image/jpeg" href="assets/logoclarity.jpg" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body class="loading-page">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <div class="noise"></div>

    <section class="entry-gate" aria-label="Verification screen">
      <div class="terminal-card">
        <div class="terminal-bar">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="terminal-body">
          <p class="terminal-line line-one">
            <span class="prompt">User:</span> Initializing ClarityX<span class="dots"></span>
          </p>
          <p class="terminal-line line-two">
            <span class="prompt">System:</span> Verifying access<span class="dots delay"></span>
          </p>
          <div class="terminal-loader" aria-label="Loading progress">
            <div class="loader-meta">
              <span>Loading modules</span>
              <span class="loader-percent"></span>
            </div>
            <div class="loader-track">
              <span class="loader-fill"></span>
            </div>
          </div>
          <p class="terminal-line line-three granted">
            <span class="prompt">System:</span> <span class="access-text">Access Granted</span><span class="cursor"></span>
          </p>
        </div>
      </div>
    </section>

    <script>
      window.setTimeout(() => {
        window.location.replace("index.html");
      }, 6600);
    </script>
  </body>
</html>
